<div id="admin-perm-form" class="mb-4 p-4 bg-white dark:bg-gray-800 rounded-lg shadow border border-gray-200 dark:border-gray-700">
    <h3 class="text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">
        Manage Permissions for '{{ username }}'
    </h3>

    {% if !permissions.is_empty() %}
    <div class="mb-3">
        <h4 class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-2 uppercase">Current Permissions</h4>
        <div class="space-y-1">
            {% for perm in permissions %}
            <div class="flex items-center justify-between text-sm bg-gray-50 dark:bg-gray-700 rounded px-3 py-1.5">
                <span class="dark:text-gray-200">
                    <span class="font-medium">{{ perm.action }}</span>
                    on {{ perm.resource_type }}
                    <span class="font-mono text-gray-600 dark:text-gray-400">'{{ perm.resource_id }}'</span>
                </span>
                <form hx-post="/admin/users/{{ user_id }}/permissions/revoke"
                      hx-target="#admin-perm-form"
                      hx-swap="outerHTML">
                    <input type="hidden" name="resource_type" value="{{ perm.resource_type }}">
                    <input type="hidden" name="resource_id" value="{{ perm.resource_id }}">
                    <button type="submit"
                            class="text-xs text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 underline">
                        Revoke all
                    </button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <h4 class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-2 uppercase">Grant Permission</h4>
    <form hx-post="/admin/users/{{ user_id }}/permissions/grant"
          hx-target="#admin-perm-form"
          hx-swap="outerHTML"
          class="flex flex-wrap items-end gap-3">
        <div>
            <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Type</label>
            <select name="resource_type"
                    class="border border-gray-300 dark:border-gray-600 rounded px-3 py-1.5 text-sm bg-white dark:bg-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="system">System</option>
                <option value="domain">Domain</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Name</label>
            <input type="text" name="resource_id" required
                   class="border border-gray-300 dark:border-gray-600 rounded px-3 py-1.5 text-sm w-48 bg-white dark:bg-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="system or domain name">
        </div>
        <div>
            <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">Actions (comma-separated, blank = all)</label>
            <input type="text" name="actions"
                   class="border border-gray-300 dark:border-gray-600 rounded px-3 py-1.5 text-sm w-64 bg-white dark:bg-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="view,create,delete,suspend,unsuspend">
        </div>
        <button type="submit"
                class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Grant
        </button>
        <button type="button"
                onclick="this.closest('#admin-perm-form').remove()"
                class="px-4 py-1.5 text-sm text-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-50 dark:hover:bg-gray-700">
            Close
        </button>
    </form>
</div>
