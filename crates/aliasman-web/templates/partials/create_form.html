<div id="create-form" class="mb-4 p-4 bg-white rounded-lg shadow border border-gray-200">
    <h3 class="text-sm font-medium text-gray-700 mb-3">Create Alias</h3>
    <form hx-post="/aliases/create"
          hx-target="#create-form"
          hx-swap="outerHTML"
          class="flex flex-wrap items-end gap-3">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Alias</label>
            <div class="flex gap-1">
                <input type="text" name="alias" id="create-alias-name" required
                       class="border border-gray-300 rounded px-3 py-1.5 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="alias name">
                <button type="button"
                        onclick="var len=parseInt(document.getElementById('random-length').value)||16;len=Math.min(len,32);var a=new Uint8Array(Math.ceil(len/2));crypto.getRandomValues(a);document.getElementById('create-alias-name').value=Array.from(a,function(b){return b.toString(16).padStart(2,'0')}).join('').slice(0,len)"
                        class="px-2 py-1.5 text-xs bg-gray-100 text-gray-600 border border-gray-300 rounded hover:bg-gray-200"
                        title="Generate random alias">
                    Random
                </button>
                <input type="number" id="random-length" value="16" min="1" max="32"
                       class="border border-gray-300 rounded px-2 py-1.5 text-sm w-14 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       title="Random alias length">
            </div>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Domain</label>
            <input type="text" name="domain" required value="{{ default_domain }}"
                   class="border border-gray-300 rounded px-3 py-1.5 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="example.com">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Email Address(es)</label>
            <input type="text" name="email_addresses" required value="{{ default_addresses }}"
                   class="border border-gray-300 rounded px-3 py-1.5 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="user@example.com, other@example.com">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Description</label>
            <input type="text" name="description"
                   class="border border-gray-300 rounded px-3 py-1.5 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="optional">
        </div>
        <button type="submit"
                class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Create
        </button>
        <button type="button"
                onclick="this.closest('#create-form').remove()"
                class="px-4 py-1.5 text-sm text-gray-600 border border-gray-300 rounded hover:bg-gray-50">
            Cancel
        </button>
    </form>
</div>
