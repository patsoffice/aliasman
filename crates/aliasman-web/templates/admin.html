{% extends "base.html" %}

{% block title %} - User Management{% endblock %}

{% block nav_right %}
<div class="flex items-center gap-3">
    <a href="/" class="text-sm text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 underline">Aliases</a>
    <span class="text-sm text-gray-500 dark:text-gray-400">{{ username }}</span>
    <form method="POST" action="/logout" class="inline">
        <button type="submit"
                class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 underline">
            Sign out
        </button>
    </form>
</div>
{% endblock %}

{% block content %}
<div>
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">User Management</h2>
        <button class="px-3 py-1.5 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                hx-get="/admin/users/create"
                hx-target="#admin-form-container"
                hx-swap="innerHTML">
            + Create User
        </button>
    </div>

    <div id="admin-form-container"></div>
    <div id="admin-result"></div>

    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-lg shadow">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
            <thead class="bg-gray-50 dark:bg-gray-700">
                <tr>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Username</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Role</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Permissions</th>
                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody id="user-table-body" class="divide-y divide-gray-200 dark:divide-gray-700"
                   hx-get="/admin/users/rows"
                   hx-trigger="user-changed from:body"
                   hx-swap="innerHTML">
                {% include "partials/admin_user_rows.html" %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
